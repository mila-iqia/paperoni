<div class="form-row">
    <div class="form-group">
        <label for="title"><loc-text>Title</loc-text></label>
        <input type="text" id="title" name="title" placeholder="Search by title..." data-loc-placeholder="Search by title...">
    </div>
    <div class="form-group">
        <label for="author"><loc-text>Author</loc-text></label>
        <input type="text" id="author" name="author" placeholder="Search by author..." data-loc-placeholder="Search by author...">
    </div>
    <div class="form-group">
        <label for="institution"><loc-text>Institution</loc-text></label>
        <input type="text" id="institution" name="institution" placeholder="Search by institution..." data-loc-placeholder="Search by institution...">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="venue"><loc-text>Venue</loc-text></label>
        <input type="text" id="venue" name="venue" placeholder="Search by venue..." data-loc-placeholder="Search by venue...">
    </div>
    <div class="form-group">
        <label for="start_date"><loc-text>Start Date</loc-text></label>
        <input type="date" id="start_date" name="start_date">
    </div>
    <div class="form-group">
        <label for="end_date"><loc-text>End Date</loc-text></label>
        <input type="date" id="end_date" name="end_date">
    </div>
</div>
<div class="form-row">
    <div class="form-group" style="display: flex; align-items: center;">
        <label style="display: flex; align-items: center; gap: 5px; margin-bottom: 0;">
            <loc-text>Peer reviewed</loc-text> <input type="checkbox" id="peerReviewed" name="peerReviewed" style="width: auto;">
        </label>
    </div>
    <div class="form-group" style="flex: 0; align-self: flex-end;">
        <button type="button" id="clearSearch" class="btn-clear"><loc-text>Clear</loc-text></button>
    </div>
</div>
