<div class="form-row">
    <div class="form-group">
        <label for="title"><loc>Title</loc></label>
        <input type="text" id="title" name="title" placeholder="Search by title..." data-loc-placeholder="Search by title...">
    </div>
    <div class="form-group">
        <label for="author"><loc>Author</loc></label>
        <input type="text" id="author" name="author" placeholder="Search by author..." data-loc-placeholder="Search by author...">
    </div>
    <div class="form-group">
        <label for="institution"><loc>Institution</loc></label>
        <input type="text" id="institution" name="institution" placeholder="Search by institution..." data-loc-placeholder="Search by institution...">
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="venue"><loc>Venue</loc></label>
        <input type="text" id="venue" name="venue" placeholder="Search by venue..." data-loc-placeholder="Search by venue...">
    </div>
    <div class="form-group">
        <label for="topic"><loc>Topic</loc></label>
        <input type="text" id="topic" name="topic" placeholder="Search by topic..." data-loc-placeholder="Search by topic...">
    </div>
    <div class="form-group form-date-pair">
        <div class="form-group">
            <label for="start_date"><loc>Start Date</loc></label>
            <input type="date" id="start_date" name="start_date">
        </div>
        <div class="form-group">
            <label for="end_date"><loc>End Date</loc></label>
            <input type="date" id="end_date" name="end_date">
        </div>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label for="status"><loc>Type</loc></label>
        <input type="text" id="status" name="status" placeholder="e.g. peer-reviewed, preprint, workshop" data-loc-placeholder="e.g. peer-reviewed, preprint, workshop">
    </div>
    <div class="form-group" style="display: flex; align-items: center;">
        <label style="display: flex; align-items: center; gap: 5px; margin-bottom: 0;">
            <loc>Peer reviewed</loc> <input type="checkbox" id="peerReviewed" name="peerReviewed" style="width: auto;">
        </label>
    </div>
    <div class="form-group" style="flex: 0; align-self: flex-end; display: flex; gap: 8px; align-items: center;">
        {% if show_json_export %}<span class="btn-json-wrap">
            <button type="button" id="exportJson" class="btn-json"><loc>JSON</loc></button>
            <button type="button" id="exportJsonCancel" class="btn-json-x" tabindex="-1" aria-label="Cancel export" title="Cancel export">&times;</button>
        </span>
        <span class="btn-json-wrap">
            <button type="button" id="exportCsv" class="btn-json"><loc>CSV</loc></button>
            <button type="button" id="exportCsvCancel" class="btn-json-x" tabindex="-1" aria-label="Cancel export" title="Cancel export">&times;</button>
        </span>{% endif %}
        <button type="button" id="clearSearch" class="btn-clear"><loc>Clear</loc></button>
    </div>
</div>
